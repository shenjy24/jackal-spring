plugins {
    id 'java'
}

group 'com.jonas'
version '1.0.0-SNAPSHOT'

repositories {
    maven {url "http://maven.aliyun.com/nexus/content/groups/public"}
}

dependencies {
    compile 'org.springframework:spring-core:5.2.9.RELEASE'
    compile 'org.springframework:spring-beans:5.2.9.RELEASE'
    compile 'org.springframework:spring-aop:5.2.9.RELEASE'
    compile 'org.springframework:spring-context:5.2.9.RELEASE'
    compile 'org.springframework:spring-aspects:5.2.9.RELEASE'
    implementation 'org.projectlombok:lombok:1.18.8'
    annotationProcessor 'org.projectlombok:lombok:1.18.8'
    testCompile group: 'junit', name: 'junit', version: '4.12'
}
